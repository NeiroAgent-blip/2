

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Практика резонансного дыхания</title>

  <style>
    :root {
      --cream: #FAF9F6;
      --taupe: #A1887F;
      --terracotta: #8D6E63;
      --rose: #BCAAA4;
      --ink: #4B3C37;
      --soft: #EFE8E4;
      --white: #FFFFFF;
      --shadow: rgba(75, 60, 55, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(188, 170, 164, 0.38), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(161, 136, 127, 0.24), transparent 31rem),
        var(--cream);
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .app {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: minmax(300px, 430px) 1fr;
      gap: 28px;
    }

    .panel,
    .practice-stage {
      border: 1px solid rgba(161, 136, 127, 0.22);
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 24px 70px var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 34px;
    }

    .panel {
      padding: 34px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 9px 14px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--terracotta);
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 5vw, 4.5rem);
      line-height: 0.96;
      letter-spacing: -0.07em;
    }

    .lead {
      margin: 22px 0 30px;
      font-size: 1.04rem;
      line-height: 1.7;
      color: rgba(75, 60, 55, 0.78);
    }

    .settings {
      display: grid;
      gap: 18px;
    }

    .control {
      display: grid;
      gap: 10px;
      padding: 17px;
      border-radius: 24px;
      background: rgba(250, 249, 246, 0.86);
      border: 1px solid rgba(161, 136, 127, 0.18);
    }

    .control label {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
    }

    .value {
      color: var(--terracotta);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--terracotta);
    }

    select {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 18px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .primary {
      color: var(--cream);
      background: linear-gradient(135deg, var(--terracotta), var(--taupe));
    }

    .secondary {
      color: var(--terracotta);
      background: var(--soft);
    }

    .practice-stage {
      position: relative;
      min-height: 640px;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 34px;
    }

    .breath-circle {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 32%, rgba(255,255,255,0.82), transparent 28%),
        linear-gradient(145deg, rgba(188,170,164,0.88), rgba(141,110,99,0.88));
      box-shadow:
        inset -18px -18px 38px rgba(75, 60, 55, 0.14),
        inset 18px 18px 38px rgba(255,255,255,0.38),
        0 30px 70px rgba(141,110,99,0.3);

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      transform: scale(0.82);
      transition: transform 4s cubic-bezier(0.37, 0, 0.22, 1);
    }

    .inner-glow {
      width: 58%;
      height: 58%;
      border-radius: 50%;
      border: 1px solid rgba(250,249,246,0.52);
      background: rgba(250,249,246,0.12);

      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;

      color: var(--cream);
    }

    .phase {
      font-size: 2rem;
      font-weight: 900;
    }

    .phase-time {
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 700;
    }

    .status-bar {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 30px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .progress-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(188,170,164,0.34);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--rose), var(--terracotta));
      transition: width 250ms linear;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .panel,
      .practice-stage {
        border-radius: 26px;
        padding: 22px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<main class="app">

  <section class="panel">

    <p class="eyebrow">мягкий ритм</p>

    <h1>Резонансное дыхание</h1>

    <p class="lead">
      Настройте длину вдоха и выдоха, выберите время практики
      и следуйте плавному кругу.
    </p>

    <div class="settings">

      <div class="control">
        <label for="inhale">
          Вдох
          <span class="value" id="inhaleValue">4 сек</span>
        </label>

        <input id="inhale" type="range" min="2" max="10" value="4" />
      </div>

      <div class="control">
        <label for="exhale">
          Выдох
          <span class="value" id="exhaleValue">6 сек</span>
        </label>

        <input id="exhale" type="range" min="2" max="12" value="6" />
      </div>

      <div class="control">
        <label for="duration">Время тренировки</label>

        <select id="duration">
          <option value="60">1 минута</option>
          <option value="300" selected>5 минут</option>
          <option value="600">10 минут</option>
        </select>
      </div>

    </div>

    <div class="buttons">
      <button class="primary" id="startButton">Начать</button>
      <button class="secondary" id="resetButton">Сбросить</button>
    </div>

  </section>

  <section class="practice-stage">

    <div class="breath-circle" id="breathCircle">

      <div class="inner-glow">

        <div class="phase" id="phaseText">Готовы?</div>

        <div class="phase-time" id="phaseTime">00:00</div>

      </div>

    </div>

    <div class="status-bar">

      <div class="meta">
        <span id="elapsedTime">00:00</span>
        <span id="remainingTime">05:00</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

    </div>

  </section>

</main>

<script>
  const inhaleInput = document.getElementById('inhale');
  const exhaleInput = document.getElementById('exhale');
  const durationSelect = document.getElementById('duration');

  const inhaleValue = document.getElementById('inhaleValue');
  const exhaleValue = document.getElementById('exhaleValue');

  const breathCircle = document.getElementById('breathCircle');

  const phaseText = document.getElementById('phaseText');
  const phaseTime = document.getElementById('phaseTime');

  const elapsedTime = document.getElementById('elapsedTime');
  const remainingTime = document.getElementById('remainingTime');

  const progressFill = document.getElementById('progressFill');

  const startButton = document.getElementById('startButton');
  const resetButton = document.getElementById('resetButton');

  let running = false;
  let startTime = 0;
  let animationId = null;

  function formatTime(seconds) {
    const min = String(Math.floor(seconds / 60)).padStart(2, '0');
    const sec = String(Math.floor(seconds % 60)).padStart(2, '0');
    return `${min}:${sec}`;
  }

  function updateLabels() {
    inhaleValue.textContent = inhaleInput.value + ' сек';
    exhaleValue.textContent = exhaleInput.value + ' сек';
  }

  function animate(timestamp) {

    if (!startTime) {
      startTime = timestamp;
    }

    const inhale = Number(inhaleInput.value);
    const exhale = Number(exhaleInput.value);
    const duration = Number(durationSelect.value);

    const elapsed = (timestamp - startTime) / 1000;

    const cycle = inhale + exhale;
    const position = elapsed % cycle;

    const remaining = Math.max(0, duration - elapsed);

    elapsedTime.textContent = formatTime(elapsed);
    remainingTime.textContent = formatTime(remaining);

    progressFill.style.width =
      ((elapsed / duration) * 100) + '%';

    if (position < inhale) {

      breathCircle.style.transform = 'scale(1.15)';
      phaseText.textContent = 'Вдох';
      phaseTime.textContent =
        Math.ceil(inhale - position) + ' сек';

    } else {

      breathCircle.style.transform = 'scale(0.78)';
      phaseText.textContent = 'Выдох';

      phaseTime.textContent =
        Math.ceil(cycle - position) + ' сек';
    }

    if (elapsed >= duration) {

      running = false;

      phaseText.textContent = 'Готово';
      phaseTime.textContent = 'Практика завершена';

      startButton.textContent = 'Начать снова';

      return;
    }

    animationId = requestAnimationFrame(animate);
  }

  function startPractice() {

    if (running) {
      cancelAnimationFrame(animationId);
      running = false;
      startButton.textContent = 'Продолжить';
      return;
    }

    running = true;

    if (startButton.textContent === 'Начать снова') {
      startTime = 0;
    }

    startButton.textContent = 'Пауза';

    animationId = requestAnimationFrame(animate);
  }

  function resetPractice() {

    cancelAnimationFrame(animationId);

    running = false;
    startTime = 0;

    breathCircle.style.transform = 'scale(0.82)';

    phaseText.textContent = 'Готовы?';
    phaseTime.textContent = '00:00';

    elapsedTime.textContent = '00:00';
    remainingTime.textContent =
      formatTime(Number(durationSelect.value));

    progressFill.style.width = '0%';

    startButton.textContent = 'Начать';
  }

  inhaleInput.addEventListener('input', updateLabels);
  exhaleInput.addEventListener('input', updateLabels);

  startButton.addEventListener('click', startPractice);

  resetButton.addEventListener('click', resetPractice);

  updateLabels();
</script>

</body>
</html>
